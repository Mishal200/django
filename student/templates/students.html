<table>
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Result</th>
    </tr>
    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.course }}</td>
        <td>
            {% if student.passed%}
                Passed
            {% else %}
                Failed
            {% endif %}
        </td>    
    </tr>

{% endfor %}
